<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore._.DZ | عروض Temu Premium</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 450px;
            margin: auto;
            background: rgba(15, 23, 42, 0.85);
            padding: 25px;
            border-radius: 30px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 96, 0, 0.4);
        }
        .logo { width: 85px; height: 85px; border-radius: 50%; border: 3px solid #ff6000; margin-bottom: 15px; background: #fff; }
        h1 { color: #ff6000; font-size: 26px; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .tagline { color: #94a3b8; font-size: 15px; margin-bottom: 30px; }
        
        .product-card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { width: 100%; height: auto; display: block; }
        .info { padding: 20px; }
        .price { display: block; color: #ffca28; font-size: 24px; font-weight: bold; margin: 10px 0; }
        
        .link-btn {
            display: block;
            background: linear-gradient(90deg, #ff6000, #ff8e00);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 17px;
            box-shadow: 0 4px 15px rgba(255, 96, 0, 0.3);
        }
        .instagram-btn {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.ibb.co/QFWJsrhC/image.png" alt="Logo" class="logo">
    <h1>TechStore._.DZ</h1>
    <p class="tagline">أقوى قطع الجيمنج بدقة 4K وأفضل سعر 🇩🇿</p>

    <div class="product-card">
        <img src="https://i.ibb.co/sdZKFDcD/image.png" class="product-img" alt="4K Portable Monitor">
        <div class="info">
            <strong>🖥️ شاشة لمس محمولة 15.6 بوصة (High Quality)</strong>
            <span class="price">25,100 دج</span>
            <a href="https://temu.to/k/etbf704r5of" target="_blank" class="link-btn">اطلبها الآن من Temu</a>
        </div>
    </div>

    <div class="product-card">
        <img src="https://i.ibb.co/VpwjmQPQ/image.png" class="product-img" alt="AJAZZ 4K Keyboard">
        <div class="info">
            <strong>⌨️ كيبورد AJAZZ NK61 ميكانيكي (RGB)</strong>
            <span class="price">4,570 دج</span>
            <a href="https://temu.to/k/e4i6edxh761" target="_blank" class="link-btn">اطلبها الآن من Temu</a>
        </div>
    </div>

    <a href="https://instagram.com/TechStore._.DZ" target="_blank" class="link-btn instagram-btn">📸 تابع جديد العروض على انستقرام</a>

    <div style="font-size: 12px; color: #64748b; margin-top: 25px;">
        جميع الحقوق محفوظة لـ TechStore._.DZ © 2026
    </div>
</div>

</body>
</html>
